name: Deploy Astro to S3

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::904610148329:role/GitHub-Deploy-Role
          aws-region: us-east-1  # Hoặc vùng bạn sử dụng

      - name: Sync to S3
        run: aws s3 sync ./dist s3://truongdq.com/ --delete