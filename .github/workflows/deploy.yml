name: Deploy Astro to Lightsail (Self-hosted)

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          bun run build

      - name: Deploy Static to Nginx
        run: |
          sudo rm -rf /var/www/html/*
          sudo cp -r dist/client/* /var/www/html/
          sudo chown -R www-data:www-data /var/www/html

      - name: Restart Astro Server (PM2)
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          pm2 delete portfolio || true
          HOST=127.0.0.1 PORT=4321 pm2 start dist/server/entry.mjs --name portfolio
          sudo systemctl reload nginx
