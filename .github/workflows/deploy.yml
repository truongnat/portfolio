name: Deploy Astro to Lightsail (Self-hosted)

on:
  push:
    branches:
      - main
      - preview
    paths-ignore:
      - 'src/content/journal/**'
      - '.github/workflows/weekly-summary.yml'
      - 'JOURNAL_RULES.md'
      - 'TEMPLATES_*.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── PRODUCTION deploy (main branch only) ───────────────────────────────────
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          bun run build

      - name: Deploy Static to Nginx
        run: |
          sudo rm -rf /var/www/html/*
          sudo cp -r dist/client/* /var/www/html/
          sudo chown -R www-data:www-data /var/www/html

      - name: Restart Astro Server (PM2)
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          pm2 delete portfolio || true
          HOST=127.0.0.1 PORT=4321 pm2 start dist/server/entry.mjs --name portfolio --update-env
          sudo systemctl reload nginx

  # ─── PREVIEW deploy (preview branch only) ───────────────────────────────────
  deploy-preview:
    if: github.ref == 'refs/heads/preview'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build (preview base path)
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          bun run build

      - name: Deploy to /var/www/preview
        run: |
          sudo mkdir -p /var/www/preview
          sudo rm -rf /var/www/preview/*
          sudo cp -r dist/client/* /var/www/preview/
          sudo chown -R www-data:www-data /var/www/preview

      - name: Restart Preview Server (PM2)
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          pm2 delete portfolio-preview || true
          HOST=127.0.0.1 PORT=4322 pm2 start dist/server/entry.mjs --name portfolio-preview --update-env
          sudo systemctl reload nginx

      - name: Comment preview URL
        run: |
          echo "✅ Preview deployed: https://truongdq.com/preview/"
          echo "Preview URL: https://preview.truongdq.com"
