name: Deploy Astro to Lightsail (Self-hosted)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Deploy Static to Nginx
        run: |
          sudo rm -rf /var/www/html/*
          sudo cp -r dist/client/* /var/www/html/
          sudo chown -R www-data:www-data /var/www/html

      - name: Restart Astro Server (PM2)
        run: |
          pm2 delete portfolio || true
          HOST=127.0.0.1 PORT=4321 pm2 start dist/server/entry.mjs --name portfolio
          sudo systemctl reload nginx
