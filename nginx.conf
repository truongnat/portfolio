# ==========================================================
# NGINX CONFIGURATION FOR ASTRO 6 (HYBRID MODE)
# Location: /etc/nginx/sites-available/default
# ==========================================================

# ── PRODUCTION ──────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;

    server_name truongsoftware.com www.truongsoftware.com;

    root /var/www/html;
    index index.html;

    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Content-Security-Policy "frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:; img-src 'self' data: blob: https:; font-src 'self' data: https:;" always;
    server_tokens off;

    location / {
        try_files $uri $uri/ /index.html =404;
        add_header Cache-Control "public, no-cache, proxy-revalidate";
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
    }

    error_page 404 /404/;
    location = /404/ {
        internal;
    }
}

# ── PREVIEW (subdomain preview.truongsoftware.com) ───────────────────────────
server {
    listen 80;
    listen [::]:80;

    server_name preview.truongsoftware.com;

    root /var/www/preview;
    index index.html;

    # Basic auth to protect preview from public
    auth_basic "Preview";
    auth_basic_user_file /etc/nginx/.htpasswd-preview;

    add_header X-Robots-Tag "noindex, nofollow";
    server_tokens off;

    location / {
        try_files $uri $uri/ /index.html =404;
        add_header Cache-Control "no-store";
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        expires 1h;
        access_log off;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4322;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
