# ==========================================================
# NGINX CONFIGURATION FOR ASTRO 6 (HYBRID MODE)
# Location: /etc/nginx/sites-available/default
# ==========================================================

server {
    listen 80;
    listen [::]:80;

    # CHANGE THIS to your actual domain
    server_name truongdq.com www.truongdq.com;

    # Path to static files (Astro dist/client)
    # GitHub Action copies files here: sudo cp -r dist/client/* /var/www/html/
    root /var/www/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    server_tokens off;

    # ------------------------------------------------------
    # 1. STATIC FILES & CLEAN URLs
    # ------------------------------------------------------
    location / {
        # Astro is configured with trailingSlash: "always"
        # This will look for $uri/index.html automatically
        try_files $uri $uri/ /index.html =404;
        
        # Cache policy for HTML
        add_header Cache-Control "public, no-cache, proxy-revalidate";
    }

    # ------------------------------------------------------
    # 2. STATIC ASSETS (JS, CSS, Images, Fonts)
    # ------------------------------------------------------
    # Cache immutable assets for 1 year
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------------------
    # 3. REVERSE PROXY FOR API (PM2 / Astro Server)
    # ------------------------------------------------------
    # All dynamic routes starting with /api/ go to the Node.js server
    location /api/ {
        # Port 4321 is the default Astro SSR port
        proxy_pass http://127.0.0.1:4321;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for AI Generation (Gemini can be slow)
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
    }

    # ------------------------------------------------------
    # 4. CUSTOM 404 ERROR PAGE
    # ------------------------------------------------------
    error_page 404 /404/;
    location = /404/ {
        internal;
    }
}
